<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <title>FQI § 1 — Digitale Edition (Prototyp)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <style>
    /* ============================================================
       Layout
       ============================================================ */
    :root {
      --maxw: 760px;
      --c-text: #1a1a1a;
      --c-muted: #6b6b6b;
      --c-rule: #d0d0d0;
      --c-apparatus: #8b3a3a;
      --c-apparatus-soft: #f6efef;
      --c-term: #1d4e89;
      --c-quote: #2d5016;
      --c-link: #1d4e89;
      --c-bg-hover: #fff8e1;
    }
    html { font-size: 17px; }
    body {
      font-family: "Source Serif Pro", "EB Garamond", Georgia,
                   "Times New Roman", serif;
      color: var(--c-text);
      max-width: var(--maxw);
      margin: 2em auto;
      padding: 0 1em 4em;
      line-height: 1.55;
    }
    h1, h2, h3 { font-family: "Source Sans Pro", -apple-system, sans-serif;
                 font-weight: 600; }
    h1 { font-size: 1.3rem; color: var(--c-muted);
         border-bottom: 1px solid var(--c-rule);
         padding-bottom: 0.4em; margin-bottom: 1.5em; }

    /* ============================================================
       Header bar
       ============================================================ */
    header.bar {
      max-width: var(--maxw);
      margin: 0 auto 2em;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1em;
    }
    .controls button {
      font: inherit;
      font-size: 0.85rem;
      padding: 0.3em 0.9em;
      border: 1px solid var(--c-rule);
      background: white;
      cursor: pointer;
      border-radius: 3px;
    }
    .controls button.active {
      background: var(--c-text);
      color: white;
      border-color: var(--c-text);
    }
    .controls button:hover:not(.active) { background: var(--c-bg-hover); }

    /* ============================================================
       teiHeader — verbergen in Leseansicht
       ============================================================ */
    .tei-teiHeader { display: none; }
    body.source-view .tei-teiHeader {
      display: block;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.78rem;
      background: #fafafa;
      border: 1px solid var(--c-rule);
      padding: 1em;
      margin-bottom: 2em;
      white-space: pre-wrap;
      color: var(--c-muted);
    }

    /* ============================================================
       Grundstruktur
       ============================================================ */
    .tei-TEI, .tei-text, .tei-body, .tei-front { display: block; }
    .tei-div { display: block; margin: 1em 0; }
    .tei-head {
      display: block;
      font-family: "Source Sans Pro", sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      margin: 1.5em 0 1em;
    }
    .tei-p {
      display: block;
      margin: 1em 0;
      text-align: justify;
      hyphens: auto;
    }

    /* ============================================================
       Visuelle Ebene (Šimek 2)
       ============================================================ */
    .tei-hi-letter-spaced { letter-spacing: 0.18em; }
    .tei-hi-italic { font-style: italic; }

    .tei-pb {
      display: inline;
      color: var(--c-muted);
      font-size: 0.75em;
      vertical-align: super;
      margin: 0 0.15em;
    }
    .tei-pb::before { content: "|"; }
    .tei-pb-GA { color: #444; font-weight: 600; }
    .tei-pb-A  { color: #888; font-style: italic; }

    /* ============================================================
       Extensionale Ebene (Šimek 4)
       ============================================================ */
    .tei-rs-SubjectReference {
      color: var(--c-term);
      border-bottom: 1px dotted var(--c-term);
      cursor: help;
    }
    .tei-rs-SubjectReference:hover { background: var(--c-bg-hover); }

    .tei-persName-PersonReference {
      font-variant: small-caps;
      font-size: 0.95em;
    }

    .tei-quote-PrimarySourceQuotation {
      color: var(--c-quote);
      font-style: italic;
    }

    /* ============================================================
       Varianzebene (Šimek 5)
       ============================================================ */
    .tei-app { display: inline; }
    .tei-lem { display: inline; }
    .tei-rdg { display: none; }

    body.source-view .tei-rdg {
      display: inline;
      color: var(--c-apparatus);
      background: var(--c-apparatus-soft);
      padding: 0 0.2em;
      margin: 0 0.1em;
      font-size: 0.85em;
    }
    body.source-view .tei-rdg::before {
      content: " ⫶ " attr(data-wit) ": ";
      color: var(--c-muted);
    }

    /* Fußnoten-Anker (Šimek 1: semantisch-logisch, hier:
       Verknüpfung Sinneinheit ↔ Anmerkung). Marker-Text wird
       per JS aus @n der Ziel-<note> übernommen; daher kein
       statisches ::before/::after mehr. — Färbung trennt
       Barth-Anmerkungen (authorial, dunkel) von Herausgeber-
       Apparat (editorial, dunkelrot wie Apparat-CSS). */
    .tei-ref-note {
      display: inline;
      vertical-align: super;
      font-size: 0.7em;
      cursor: pointer;
      font-weight: 600;
      padding: 0 0.1em;
    }
    .tei-ref-note-authorial { color: var(--c-text); }
    .tei-ref-note-authorial:hover { background: var(--c-bg-hover); }
    .tei-ref-note-editorial { color: var(--c-apparatus); }
    .tei-ref-note-editorial:hover { background: var(--c-apparatus-soft); }

    .tei-ref-bibl {
      display: inline;
      color: var(--c-muted);
      font-size: 0.92em;
    }

    /* ============================================================
       Fußnoten-Block
       ============================================================ */
    .tei-note-foot {
      display: block;
      font-size: 0.84rem;
      line-height: 1.45;
      margin: 0.6em 0;
      padding-left: 2.2em;
      text-indent: -2.2em;
    }
    .tei-note-foot-authorial::before {
      font-weight: 600;
      color: var(--c-text);
    }
    .tei-note-foot-editorial::before {
      font-weight: 600;
      color: var(--c-apparatus);
    }
    .tei-note-foot-first {
      margin-top: 2em;
      padding-top: 1em;
      border-top: 1px solid var(--c-rule);
    }
    .tei-note-foot-first-app {
      margin-top: 1.5em;
      padding-top: 1em;
      border-top: 1px dashed var(--c-apparatus);
      color: #444;
    }

    .tei-bibl { display: inline; }
    .tei-q { display: inline; }
    .tei-q::before { content: "„"; }
    .tei-q::after  { content: """; }
    .tei-q-la::before { content: "«"; }
    .tei-q-la::after  { content: "»"; }

    /* ============================================================
       Quellenansicht: ana-Marker
       ============================================================ */
    body.source-view .has-ana::after {
      content: " {" attr(data-ana) "}";
      font-family: ui-monospace, monospace;
      font-size: 0.65em;
      color: var(--c-muted);
      vertical-align: super;
    }

    /* ============================================================
       Tooltip
       ============================================================ */
    [data-tooltip] { position: relative; }
    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 1.6em;
      left: 0;
      background: var(--c-text);
      color: white;
      font-size: 0.75rem;
      padding: 0.3em 0.6em;
      border-radius: 3px;
      white-space: nowrap;
      z-index: 100;
      font-family: ui-monospace, monospace;
    }

    /* ============================================================
       Status / Loading
       ============================================================ */
    #status {
      font-size: 0.85rem;
      color: var(--c-muted);
      text-align: center;
      padding: 3em 0;
    }
    #status.error {
      color: #a33;
      background: #fdf2f2;
      padding: 1em;
      border-radius: 4px;
      text-align: left;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header class="bar">
    <h1>Karl Barth, <em>Fides quaerens intellectum</em>, § 1.1 — Prototyp einer digitalen Edition (heiEDITIONS-Variante)</h1>
    <div class="controls">
      <button id="btn-reading" class="active">Leseansicht</button>
      <button id="btn-source">Quellenansicht</button>
    </div>
  </header>

  <div id="status">Lade TEI-Daten…</div>
  <div id="TEI"></div>

  <!-- Kein externes Skript — rein nativer fetch + DOMParser -->
  <script>
    "use strict";

    const TEI_FILE    = "fqi-barth-1931-section1-heiEDITIONS.xml";
    const statusEl    = document.getElementById("status");
    const teiContainer = document.getElementById("TEI");

    /* ------------------------------------------------------------------ */
    /* TEI-Namespace                                                        */
    /* ------------------------------------------------------------------ */
    const TEI_NS = "http://www.tei-c.org/ns/1.0";

    /* ------------------------------------------------------------------ */
    /* Hilfsfunktionen                                                      */
    /* ------------------------------------------------------------------ */

    /** Gibt den lokalen Tag-Namen ohne Namespace zurück. */
    function localName(node) {
      return node.localName || node.nodeName.replace(/^.*:/, "");
    }

    /** Liest ein Attribut über alle Namespace-Varianten. */
    function attr(node, name) {
      return node.getAttribute(name)
          || node.getAttributeNS(null, name)
          || node.getAttributeNS("http://www.w3.org/XML/1998/namespace",
                                  name.replace(/^xml:/, ""))
          || null;
    }

    /* ------------------------------------------------------------------ */
    /* Konvertierung: XML-Node → HTML-Element                               */
    /* ------------------------------------------------------------------ */
    function convertNode(xmlNode, htmlParent) {
      /* Text-Knoten direkt anhängen */
      if (xmlNode.nodeType === Node.TEXT_NODE) {
        htmlParent.appendChild(document.createTextNode(xmlNode.nodeValue));
        return;
      }
      if (xmlNode.nodeType !== Node.ELEMENT_NODE) return;

      const tag  = localName(xmlNode);
      let   el   = null;

      switch (tag) {

        /* ── Strukturebene (Šimek 1) ── */
        case "TEI":
          el = span("div", "tei-TEI"); break;
        case "teiHeader":
          el = span("div", "tei-teiHeader");
          el.textContent = xmlNode.textContent;
          htmlParent.appendChild(el);
          return;                       /* keine Rekursion in teiHeader */
        case "text":
          el = span("div", "tei-text"); break;
        case "front":
          el = span("div", "tei-front"); break;
        case "body":
          el = span("div", "tei-body"); break;
        case "div":
          el = span("div", "tei-div");
          if (attr(xmlNode, "type"))
            el.dataset.type = attr(xmlNode, "type");
          break;
        case "head":
          el = span("div", "tei-head"); break;
        case "p":
          el = span("p", "tei-p"); break;
        case "s":
          el = span("span", "tei-s"); break;

        /* ── Visuelle Ebene (Šimek 2) ── */
        case "pb": {
          el = span("span", "tei-pb");
          const n  = attr(xmlNode, "n")  || "";
          const ed = attr(xmlNode, "ed") || "";
          el.dataset.n = n;
          if (ed === "#GA") el.classList.add("tei-pb-GA");
          if (ed === "#A")  el.classList.add("tei-pb-A");
          el.setAttribute("data-n", n);
          /* ::after zeigt attr(n) — wir setzen auch ein data-n */
          el.style.cssText += "";
          /* Seiten-Nummer direkt als CSS-Custom-Property oder
             einfacher: text-content via JS */
          el.insertAdjacentHTML("beforeend",
            `<span style="display:none">${n}</span>`);
          /* Stattdessen: zwei Pseudo-Spans für ::before / ::after */
          el = null;
          /* Vereinfachter Weg: direkt einen <span> mit Text */
          const pbEl = document.createElement("span");
          pbEl.className = "tei-pb" + (ed === "#GA" ? " tei-pb-GA" : ed === "#A" ? " tei-pb-A" : "");
          pbEl.textContent = "|" + n + "|";
          pbEl.title = "Seitenumbruch " + (ed || "") + " S. " + n;
          htmlParent.appendChild(pbEl);
          return;
        }

        case "lb":
          htmlParent.appendChild(document.createElement("br"));
          return;

        case "hi": {
          const rend = attr(xmlNode, "rend") || attr(xmlNode, "rendition") || "";
          el = span("span", "tei-hi");
          if (rend.includes("letter-spaced") || rend.includes("spaced"))
            el.classList.add("tei-hi-letter-spaced");
          if (rend.includes("italic") || rend.includes("i"))
            el.classList.add("tei-hi-italic");
          break;
        }

        /* ── Linguistische Ebene (Šimek 3) ── */
        case "foreign":
          el = span("span", "tei-foreign");
          el.lang = attr(xmlNode, "xml:lang") || attr(xmlNode, "lang") || "";
          break;

        /* ── Extensionale Ebene (Šimek 4) ── */
        case "rs": {
          el = span("span", "tei-rs");
          applyAna(xmlNode, el, "SubjectReference", "tei-rs-SubjectReference");
          applyRef(xmlNode, el);
          break;
        }
        case "persName": {
          el = span("span", "tei-persName");
          applyAna(xmlNode, el, "PersonReference", "tei-persName-PersonReference");
          applyRef(xmlNode, el);
          break;
        }
        case "placeName":
          el = span("span", "tei-placeName");
          applyRef(xmlNode, el);
          break;
        case "title": {
          el = span("span", "tei-title");
          const rend = attr(xmlNode, "rend") || attr(xmlNode, "rendition") || "";
          if (rend.includes("italic") || rend.includes("i"))
            el.classList.add("tei-hi-italic");
          applyAna(xmlNode, el, "WorkReference", "tei-title-WorkReference");
          applyRef(xmlNode, el);
          break;
        }
        case "term":
          el = span("span", "tei-term");
          applyRef(xmlNode, el);
          break;

        case "quote": {
          el = span("span", "tei-quote");
          applyAna(xmlNode, el, "PrimarySourceQuotation",
                   "tei-quote-PrimarySourceQuotation");
          break;
        }
        case "q": {
          el = span("span", "tei-q");
          const qlang = attr(xmlNode, "xml:lang") || "";
          if (qlang === "la") el.classList.add("tei-q-la");
          break;
        }

        case "ref": {
          const type   = attr(xmlNode, "type")   || "";
          const target = attr(xmlNode, "target") || "";
          el = span("span", "tei-ref-" + (type || "ref"));
          if (target) {
            el.dataset.target = target;
            if (type === "note") {
              /* A-Lösung: das Marker-Zeichen aus dem Ziel-<note>
                 dereferenzieren. Der XML-Knoten ist hier ein
                 leeres Element <ref type="note" target="#fn-X"/>;
                 das anzuzeigende Zeichen (1, 2, …, a, b, …) steht
                 als @n auf der Ziel-<note>. */
              const id = target.startsWith("#") ? target.slice(1) : target;
              /* xml:id ist kein HTML-id, deshalb über Attribut-
                 Selektor; DOMParser indiziert xml:id im allgemeinen
                 nicht via getElementById. */
              const noteEl = xmlNode.ownerDocument.querySelector(
                '[*|id="' + id + '"]'
              );
              if (noteEl) {
                const markerText = noteEl.getAttribute("n") || "";
                const noteType   = noteEl.getAttribute("type") || "";
                el.textContent = markerText;
                if (noteType === "authorial") {
                  el.classList.add("tei-ref-note-authorial");
                } else if (noteType === "editorial") {
                  el.classList.add("tei-ref-note-editorial");
                }
              }
              el.addEventListener("click", () => {
                const noteHtml = document.getElementById(id);
                if (noteHtml) noteHtml.scrollIntoView(
                  { behavior: "smooth", block: "center" }
                );
              });
              /* Inhalt ist gesetzt; convertChildren würde nichts
                 anhängen (leeres Element), aber zur Sicherheit:
                 wir umgehen den Standard-Append-Pfad. */
              htmlParent.appendChild(el);
              return;
            }
          }
          break;
        }

        case "bibl":
          el = span("span", "tei-bibl"); break;
        case "citedRange":
          el = span("span", "tei-citedRange"); break;

        /* ── Varianzebene (Šimek 5) ── */
        case "app":
          el = span("span", "tei-app"); break;
        case "lem":
          el = span("span", "tei-lem"); break;
        case "rdg": {
          el = span("span", "tei-rdg");
          const wit = attr(xmlNode, "wit") || "";
          if (wit) el.dataset.wit = wit;
          break;
        }
        case "choice": {
          /* <choice><sic>/<corr> oder <orig>/<reg> */
          el = span("span", "tei-choice");
          /* In Leseansicht: corr/reg bevorzugen, sic/orig verbergen */
          const corr = xmlNode.querySelector("corr, reg");
          const sic  = xmlNode.querySelector("sic, orig");
          if (corr) {
            const corrEl = span("span", "tei-corr");
            convertChildren(corr, corrEl);
            htmlParent.appendChild(corrEl);
          } else if (sic) {
            convertChildren(sic, htmlParent);
          }
          return;
        }
        case "sic":
          el = span("span", "tei-sic"); break;
        case "corr":
          el = span("span", "tei-corr"); break;
        case "subst":
          el = span("span", "tei-subst"); break;
        case "add":
          el = span("span", "tei-add"); break;
        case "del":
          el = span("span", "tei-del");
          el.style.display = "none";  /* Tilgungen in Leseansicht unterdrücken */
          break;

        /* ── Fußnoten ── */
        case "note": {
          const place = attr(xmlNode, "place") || "";
          const type  = attr(xmlNode, "type")  || "";
          const n     = attr(xmlNode, "n")      || "";
          const xmlId = attr(xmlNode, "xml:id") || "";

          el = span("div", "tei-note-foot");
          if (type === "authorial") {
            el.classList.add("tei-note-foot-authorial");
            el.dataset.marker = n;
            el.style.setProperty("--note-marker", JSON.stringify(n + "  "));
          }
          if (type === "editorial") {
            el.classList.add("tei-note-foot-editorial");
            el.dataset.marker = n;
          }
          /* Marker als erstes Kind einfügen */
          if (n) {
            const marker = document.createElement("span");
            marker.className = "note-marker";
            marker.style.fontWeight = "600";
            marker.style.color = type === "editorial" ? "var(--c-apparatus)" : "var(--c-text)";
            marker.style.marginRight = "0.4em";
            marker.textContent = n;
            el.appendChild(marker);
          }
          if (xmlId) el.id = xmlId;
          break;
        }

        /* ── Sonstige, stillschweigend weiterlaufen ── */
        default:
          /* Unbekannte Elemente: Inhalt trotzdem rendern */
          convertChildren(xmlNode, htmlParent);
          return;
      }

      if (!el) return;
      convertChildren(xmlNode, el);
      htmlParent.appendChild(el);
    }

    /* Erstellt ein HTML-Element mit Klasse */
    function span(tag, cls) {
      const el = document.createElement(tag);
      if (cls) el.className = cls;
      return el;
    }

    /* Überträgt ana-Klasse und data-ana */
    function applyAna(xmlNode, el, concept, cssClass) {
      const ana = attr(xmlNode, "ana") || "";
      if (ana.includes(concept)) {
        el.classList.add(cssClass);
        el.classList.add("has-ana");
        el.dataset.ana = ana;
      }
    }

    /* Überträgt @ref als data-tooltip */
    function applyRef(xmlNode, el) {
      const ref = attr(xmlNode, "ref") || "";
      if (ref) {
        el.dataset.tooltip = "→ " + ref;
      }
    }

    /* Rekursiv alle Kinder konvertieren */
    function convertChildren(xmlNode, htmlParent) {
      xmlNode.childNodes.forEach(child => convertNode(child, htmlParent));
    }

    /* ------------------------------------------------------------------ */
    /* Hauptlogik: fetch → parse → render                                  */
    /* ------------------------------------------------------------------ */
    fetch(TEI_FILE)
      .then(res => {
        if (!res.ok) throw new Error("HTTP " + res.status + " beim Laden von " + TEI_FILE);
        return res.text();
      })
      .then(xmlText => {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "application/xml");

        /* Parsing-Fehler abfangen */
        const parseErr = xmlDoc.querySelector("parsererror");
        if (parseErr) throw new Error("XML-Parsing-Fehler: " + parseErr.textContent);

        /* Erste-Fußnoten-Klasse: Trennlinie vor erstem authorial- und
           erstem editorial-note setzen */
        const notes = xmlDoc.querySelectorAll("note[place='foot']");
        let firstAuth = true, firstEdit = true;
        notes.forEach(n => {
          const t = n.getAttribute("type");
          if (t === "authorial" && firstAuth) {
            n.setAttribute("data-first", "authorial");
            firstAuth = false;
          }
          if (t === "editorial" && firstEdit) {
            n.setAttribute("data-first", "editorial");
            firstEdit = false;
          }
        });

        /* Rendern */
        statusEl.remove();
        const root = xmlDoc.documentElement;
        convertNode(root, teiContainer);

        /* Trennlinien nachträglich setzen */
        const firstAuthEl = teiContainer.querySelector(
          ".tei-note-foot-authorial:first-of-type, .tei-note-foot-authorial"
        );
        if (firstAuthEl) firstAuthEl.classList.add("tei-note-foot-first");

        const allEditEl = teiContainer.querySelectorAll(".tei-note-foot-editorial");
        if (allEditEl.length > 0) allEditEl[0].classList.add("tei-note-foot-first-app");
      })
      .catch(err => {
        statusEl.classList.add("error");
        statusEl.innerHTML =
          "<strong>Fehler beim Laden der TEI-Datei:</strong><br><br>" +
          err.message + "<br><br>" +
          "Falls Sie diese Datei lokal mit Doppelklick geöffnet haben " +
          "(Protokoll <code>file://</code>), starten Sie bitte einen " +
          "lokalen HTTP-Server:<br><br>" +
          "<code>python3 -m http.server 8000</code><br>" +
          "→ <code>http://localhost:8000/viewer.html</code>";
      });

    /* ------------------------------------------------------------------ */
    /* Reading- vs. Source-View Toggle                                     */
    /* ------------------------------------------------------------------ */
    const btnR = document.getElementById("btn-reading");
    const btnS = document.getElementById("btn-source");
    btnR.addEventListener("click", () => {
      document.body.classList.remove("source-view");
      btnR.classList.add("active"); btnS.classList.remove("active");
    });
    btnS.addEventListener("click", () => {
      document.body.classList.add("source-view");
      btnS.classList.add("active"); btnR.classList.remove("active");
    });
  </script>
</body>
</html>
